<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- v1.0.1: tightened — no wildcard connect-src. The renderer never makes direct
         network calls to user-supplied AI / IMAP / SSH endpoints; those go through the
         main process. The renderer DOES load HLS chunks (EyeSpy) and webview content,
         but HLS goes via the <video> element under media-src, and <webview> spawns its
         own webContents with its own CSP, not this one. So the renderer's own connect-src
         can be locked to 'self' + the localhost ports we need for Ollama-via-renderer
         (currently unused; reserved for a possible future direct-call path). -->
    <!-- 'wasm-unsafe-eval' permits WebAssembly compilation (vosk-browser offline STT) — it does
         NOT permit JS eval(). ga98model: in connect-src lets the vosk worker fetch the bundled
         model archive. -->
    <!-- connect-src https:/http: (added R2): the GeoINT MapLibre globe fetches raster basemap
         tiles inside its Web Worker via fetch()/XHR (responseType=arraybuffer), which CSP governs
         under connect-src — NOT img-src (that path is for <img>, which Leaflet uses). The same tile
         hosts are already permitted under img-src/media-src for the Leaflet path; this mirrors that
         allowance for the worker fetch so the globe's gated tiles load. Egress is still gated at the
         app layer (no tiles fetched unless settings.geoint.networkEnabled). worker-src already
         allows blob: for MapLibre's workers; frame-src is untouched (security boundary). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' dcs98-plugin:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src 'self' blob: ga98media: https: http:; connect-src 'self' ga98model: dcs98-plugin: https: http: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-src https://www.google.com https://maps.google.com https://www.instantstreetview.com; worker-src 'self' blob:; form-action 'none';" />
    <title>Dead Cyber Society 98</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
