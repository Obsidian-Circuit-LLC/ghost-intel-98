<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!--
    Bundled internal CCTV player.

    Loaded inside a `<webview partition="persist:cctv-tor">` whose session proxy is
    set to the Tor SOCKS port by the main process (geoint/cctv-tor.ts). Reads
    `?kind=&url=` from its OWN query string, decodes once, and plays the stream with
    a local bundled hls.js / <img> / <video>. NO node, NO IPC, NO external CDN.

    CSP: deny everything by default. Scripts run only from this directory ('self' —
    hls.min.js + player.js, both shipped in resources/cctv-player/). Media/images may
    be fetched over the (Tor-proxied) network. Inline styles are allowed for the
    minimal layout; inline scripts are NOT (player logic lives in player.js).
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; media-src https: http:; img-src https: http: data:; connect-src https: http:;" />
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #stage { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #stage video, #stage img { max-width: 100%; max-height: 100%; width: auto; height: auto; }
    #msg { color: #d8c8ff; font: 13px/1.5 system-ui, sans-serif; padding: 1.5rem; text-align: center; }
  </style>
</head>
<body>
  <div id="stage"><div id="msg">Loading…</div></div>
  <script src="./hls.min.js"></script>
  <script src="./player.js"></script>
</body>
</html>
